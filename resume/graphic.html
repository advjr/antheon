<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthony De Vera Jr — Graphic Design Portfolio</title>
  <meta name="description" content="Graphic design portfolio of Anthony De Vera Jr — branding, social media, Meta ads, product design, email design, web design and video." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-soft: #2b2b2b;
      --paper: #f7f6f3;
      --paper-card: #ffffff;
      --muted: #8a8a86;
      --line: #e7e5e0;
      --accent: #c8a35b;
      --dark: #171717;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --display: 'Space Grotesk', var(--sans);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    ::selection { background: var(--accent); color: #fff; }

    /* ---------- HEADER ---------- */
    .top {
      background: var(--dark);
      color: #ededed;
      padding: 20px 0;
      position: sticky; top: 0; z-index: 40;
    }
    .top-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--sidebar-line, #2e2e2e); }
    .brand .who { font-family: var(--display); font-weight: 700; font-size: 1rem; line-height: 1.1; }
    .brand .who span { display: block; font-family: var(--sans); font-weight: 400; font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-top: 3px; }
    .back-link {
      font-family: var(--display); font-size: 0.78rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      border: 1px solid #2e2e2e; padding: 10px 18px; border-radius: 8px;
      transition: all .2s ease; white-space: nowrap;
    }
    .back-link:hover { border-color: var(--accent); color: #fff; }

    /* ---------- HERO ---------- */
    .hero { max-width: 1200px; margin: 0 auto; padding: 60px 28px 30px; }
    .kicker {
      font-family: var(--display); font-size: 0.72rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent);
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .kicker::before { content: ""; width: 28px; height: 1px; background: var(--accent); }
    .hero h1 {
      font-family: var(--display); font-weight: 700;
      font-size: clamp(2.2rem, 5vw, 3.2rem); letter-spacing: -1.5px; line-height: 1.05;
    }
    .hero p { color: var(--ink-soft); margin-top: 16px; max-width: 620px; font-size: 1.02rem; }

    /* ---------- FILTERS ---------- */
    .filters {
      max-width: 1200px; margin: 0 auto; padding: 24px 28px 10px;
      display: flex; flex-wrap: wrap; gap: 9px;
      position: sticky; top: 84px; z-index: 30;
    }
    .filters::before {
      content: ""; position: absolute; inset: 0; z-index: -1;
      background: var(--paper);
      -webkit-mask: linear-gradient(#000 70%, transparent);
      mask: linear-gradient(#000 70%, transparent);
    }
    .chip {
      font-family: var(--display); font-size: 0.8rem; font-weight: 600;
      padding: 9px 16px; border: 1px solid var(--line); border-radius: 22px;
      background: var(--paper-card); color: var(--ink-soft);
      transition: all .18s ease; display: inline-flex; align-items: center; gap: 7px;
    }
    .chip span {
      font-size: 0.68rem; color: var(--muted); font-weight: 500;
      background: var(--paper); padding: 1px 7px; border-radius: 10px;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #171717; }
    .chip.active span { background: rgba(0,0,0,.12); color: #171717; }

    @media (max-width: 760px) {
      .top-inner { padding: 0 18px; gap: 10px; }
      .brand img { width: 38px; height: 38px; }
      .brand .who { font-size: 0.88rem; }
      .brand .who span { font-size: 0.62rem; }
      .back-link { padding: 8px 12px; font-size: 0.68rem; }
      .hero { padding: 36px 18px 20px; }
      .filters {
        top: 68px;
        padding: 16px 18px 12px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filters::-webkit-scrollbar { display: none; }
      .chip { flex-shrink: 0; white-space: nowrap; }
      .gallery { padding: 16px 18px 70px; }
    }

    /* ---------- GALLERY (masonry) ---------- */
    .gallery {
      max-width: 1200px; margin: 0 auto; padding: 20px 28px 90px;
      column-count: 4; column-gap: 16px;
    }
    @media (max-width: 1100px) { .gallery { column-count: 3; } }
    @media (max-width: 760px)  { .gallery { column-count: 2; } }
    @media (max-width: 460px)  { .gallery { column-count: 1; } }

    .card {
      break-inside: avoid; margin-bottom: 16px;
      border-radius: 12px; overflow: hidden; position: relative;
      background: var(--paper-card); border: 1px solid var(--line);
      cursor: pointer; transition: transform .22s ease, box-shadow .22s ease;
      display: block;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 16px 34px rgba(0,0,0,.10); }
    .card img { width: 100%; display: block; }
    .card.hide { display: none; }
    .card .play {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.18); transition: background .2s ease;
    }
    .card:hover .play { background: rgba(0,0,0,.30); }
    .card .play svg { width: 54px; height: 54px; filter: drop-shadow(0 4px 12px rgba(0,0,0,.4)); }
    .card .vtag {
      position: absolute; top: 10px; left: 10px;
      font-family: var(--display); font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;
      background: rgba(0,0,0,.6); color: #fff; padding: 4px 9px; border-radius: 20px;
    }

    /* ---------- LIGHTBOX ---------- */
    .lb {
      position: fixed; inset: 0; z-index: 100; display: none;
      background: rgba(15,15,15,.92); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 30px;
    }
    .lb.open { display: flex; }
    .lb img, .lb iframe {
      max-width: 90vw; max-height: 88vh; border-radius: 8px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6); background: #000;
    }
    .lb iframe { width: 80vw; height: 82vh; border: 0; }
    .lb-close, .lb-nav {
      position: fixed; color: #fff; background: rgba(255,255,255,.1);
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s ease; z-index: 101;
    }
    .lb-close:hover, .lb-nav:hover { background: var(--accent); color: #171717; }
    .lb-close { top: 22px; right: 26px; }
    .lb-nav.prev { left: 24px; top: 50%; transform: translateY(-50%); }
    .lb-nav.next { right: 24px; top: 50%; transform: translateY(-50%); }
    .lb-nav svg, .lb-close svg { width: 22px; height: 22px; }
    @media (max-width: 600px) {
      .lb-nav { width: 40px; height: 40px; }
      .lb-nav.prev { left: 8px; } .lb-nav.next { right: 8px; }
      .lb iframe { width: 94vw; height: 70vh; }
    }

    footer {
      background: var(--dark); color: rgba(255,255,255,.6);
      text-align: center; padding: 30px 20px; font-size: 0.85rem;
    }
    footer a { color: var(--accent); }
  </style>

    ];

    const gallery = document.getElementById('gallery');
    const PLAY_SVG = '<div class="play"><svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.45)"/><path d="M10 8l6 4-6 4z" fill="#fff"/></svg></div>';

    ITEMS.forEach((it, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.cat = it.cat;
      card.dataset.index = i;
      card.innerHTML = '<img loading="lazy" src="' + it.src + '" alt="">' +
        (it.v ? '<span class="vtag">Video</span>' + PLAY_SVG : '');
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });

    // Filters
    const chips = document.querySelectorAll('.chip');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        const f = chip.dataset.f;
        document.querySelectorAll('.card').forEach(card => {
          card.classList.toggle('hide', !(f === 'all' || card.dataset.cat === f));
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    // Lightbox
    const lb = document.getElementById('lb');
    const stage = document.getElementById('lbStage');
    let current = 0;

    function visibleIndexes() {
      return ITEMS.map((_, i) => i).filter(i =>
        !document.querySelector('.card[data-index="' + i + '"]').classList.contains('hide'));
    }
    function openLightbox(i) {
      current = i;
      render();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function render() {
      const it = ITEMS[current];
      if (it.v) {
        stage.innerHTML = '<iframe src="https://drive.google.com/file/d/' + it.id +
          '/preview" allow="autoplay" allowfullscreen></iframe>';
      } else {
        stage.innerHTML = '<img src="' + it.src + '" alt="">';
      }
    }
    function closeLightbox() {
      lb.classList.remove('open');
      stage.innerHTML = '';
      document.body.style.overflow = '';
    }
    function step(dir) {
      const vis = visibleIndexes();
      let pos = vis.indexOf(current);
      pos = (pos + dir + vis.length) % vis.length;
      current = vis[pos];
      render();
    }
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => step(-1));
    document.getElementById('lbNext').addEventListener('click', () => step(1));
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') step(-1);
      if (e.key === 'ArrowRight') step(1);
    });
  </script>
